title: DNS Query to Known Crypto Drainer or Phishing Infrastructure
id: 7a3f2e01-d4c8-4b91-a1f3-5e8c9d2b4a14
status: experimental
description: |
    Detects DNS queries to domains associated with cryptocurrency wallet drainers and
    Web3 phishing infrastructure. Wallet drainers are malicious smart contracts or
    phishing sites that trick users into signing transactions that transfer all assets
    to the attacker. These attacks are typically delivered via social engineering (fake
    airdrops, spoofed DApp frontends, compromised Discord/Telegram links). Detecting
    the DNS query is an early-warning indicator before any funds are lost. This rule
    uses known patterns from drainer-as-a-service toolkits and commonly abused domains.
references:
    - https://attack.mitre.org/techniques/T1566/002/
    - https://attack.mitre.org/techniques/T1071/001/
author: jawsec
date: 2026/04/01
modified: 2026/04/01
tags:
    - attack.initial_access
    - attack.t1566.002
    - attack.command_and_control
    - attack.t1071.001
    - crypto.web3
logsource:
    category: dns_query
    product: windows
detection:
    selection_drainer_patterns:
        QueryName|contains:
            # Common drainer-as-a-service infrastructure patterns
            - 'claim-airdrop'
            - 'free-mint'
            - 'nft-claim'
            - 'token-approve'
            - 'wallet-connect-verify'
            - 'dapp-verify'
            - 'metamask-verify'
            - 'phantom-verify'
            - 'uniswap-claim'
            - 'opensea-claim'
            - 'eth-reward'
            - 'token-reward'
            - 'web3-secure'
            - 'defi-claim'
    selection_typosquat_patterns:
        QueryName|contains:
            # Common typosquats of legitimate Web3 services
            - 'uniswapp'
            - 'openseas'
            - 'metamaskk'
            - 'pancakeswapp'
            - 'aavee'
            - 'compoundd'
            - 'lido-finance'
    filter_legitimate:
        QueryName|endswith:
            - '.uniswap.org'
            - '.opensea.io'
            - '.metamask.io'
            - '.aave.com'
            - '.compound.finance'
            - '.lido.fi'
    condition: (selection_drainer_patterns or selection_typosquat_patterns) and not filter_legitimate
falsepositives:
    - Security researchers analyzing drainer infrastructure
    - Automated threat intelligence tools resolving known-bad domains for enrichment
    - Users who clicked a phishing link but caught it before interacting (still worth investigating)
level: critical
# ---
# TESTING METHODOLOGY
# To trigger this rule in a lab environment:
#   1. Ensure Sysmon is capturing DNS queries (Event ID 22)
#   2. Run: nslookup free-mint-claim-test.example.com
#   3. Or: nslookup metamask-verify-test.example.com
#   4. The domain does not need to resolve — the DNS query itself is the detection point
#   5. Verify Sysmon Event ID 22 captures the query
#   6. Confirm your SIEM fires the alert
# Expected result: Alert fires at critical severity for any drainer pattern match
# NOTE: This list should be updated regularly. Follow Web3 security researchers
# (ScamSniffer, SlowMist, CertiK) for emerging drainer domain patterns.
