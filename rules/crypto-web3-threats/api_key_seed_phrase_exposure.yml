title: Crypto API Key or Seed Phrase Pattern in Process Command Line
id: 7a3f2e01-d4c8-4b91-a1f3-5e8c9d2b4a12
status: experimental
description: |
    Detects patterns in process command lines that match cryptocurrency exchange API keys,
    private keys, or BIP-39 seed phrase fragments. Adversaries who have compromised a system
    may exfiltrate crypto credentials by passing them as command-line arguments to scripts
    or curl commands. Legitimate applications should never expose API secrets in command-line
    arguments (they belong in environment variables or encrypted config files). This rule
    catches both accidental exposure and active exfiltration attempts.
references:
    - https://attack.mitre.org/techniques/T1552/001/
    - https://attack.mitre.org/techniques/T1041/
author: jawsec
date: 2026/04/01
modified: 2026/04/01
tags:
    - attack.credential_access
    - attack.t1552.001
    - attack.exfiltration
    - attack.t1041
    - crypto.web3
logsource:
    category: process_creation
    product: windows
detection:
    selection_api_key_patterns:
        CommandLine|re:
            # Binance API keys (64-char hex)
            - '[A-Za-z0-9]{64}'
            # Ethereum private keys (64-char hex with 0x prefix)
            - '0x[a-fA-F0-9]{64}'
    selection_seed_phrase_indicators:
        CommandLine|contains:
            - 'seed phrase'
            - 'mnemonic'
            - 'recovery phrase'
            - 'private key'
            - 'secret key'
    selection_curl_with_api:
        Image|endswith:
            - '\curl.exe'
            - '\wget.exe'
            - '\powershell.exe'
        CommandLine|contains:
            - 'api_key='
            - 'apikey='
            - 'api_secret='
            - 'apisecret='
            - 'X-MBX-APIKEY'  # Binance header
    condition: selection_api_key_patterns or selection_seed_phrase_indicators or selection_curl_with_api
falsepositives:
    - Developers testing crypto API integrations with test/sandbox keys
    - Legitimate scripts that incorrectly pass API keys via command line (fix the script)
    - Long hex strings that are not actually crypto keys (SHA-256 hashes, GUIDs)
    - Security tools scanning for exposed credentials (they match the same patterns)
level: critical
# ---
# TESTING METHODOLOGY
# To trigger this rule in a lab environment:
#   1. Ensure Sysmon is capturing process creation (Event ID 1)
#   2. Open PowerShell and run:
#      curl.exe "https://httpbin.org/get?api_key=test_not_real_key_abc123"
#   3. Or simulate a seed phrase exposure:
#      echo "mnemonic: abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon about"
#   4. Verify Sysmon captures the command line
#   5. Confirm your SIEM fires the alert
# WARNING: Never use real API keys or seed phrases in testing. Use obviously fake values.
# Expected result: Alert fires at critical severity for any matching pattern
