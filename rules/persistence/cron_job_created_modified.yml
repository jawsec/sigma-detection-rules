title: Cron Job Created or Modified
id: 7a3f2e01-d4c8-4b91-a1f3-5e8c9d2b4a05
status: experimental
description: |
    Detects modifications to cron directories or the use of crontab to install new
    scheduled tasks on Linux systems. Cron is one of the most common persistence
    mechanisms on Linux — adversaries use it to maintain access by scheduling
    reverse shells, cryptocurrency miners, or data exfiltration scripts that
    execute on a recurring basis. Changes to cron outside of known maintenance
    windows should always be investigated.
references:
    - https://attack.mitre.org/techniques/T1053/003/
author: jawsec
date: 2026/04/01
modified: 2026/04/01
tags:
    - attack.persistence
    - attack.t1053.003
    - attack.execution
logsource:
    category: process_creation
    product: linux
detection:
    selection_crontab:
        Image|endswith: '/crontab'
        CommandLine|contains:
            - '-e'
            - '-i'
            - '-l'
    selection_file_write:
        Image|endswith:
            - '/nano'
            - '/vi'
            - '/vim'
            - '/tee'
            - '/cp'
            - '/mv'
        CommandLine|contains:
            - '/etc/cron'
            - '/var/spool/cron'
            - '/etc/crontab'
    selection_echo_redirect:
        Image|endswith:
            - '/bash'
            - '/sh'
        CommandLine|contains:
            - 'cron'
            - 'crontab'
    condition: selection_crontab or selection_file_write or selection_echo_redirect
falsepositives:
    - System administrators adding legitimate maintenance cron jobs
    - Package managers (apt, yum) installing services that include cron entries
    - Configuration management tools (Ansible, Puppet) managing scheduled tasks
    - Log rotation (logrotate) configuration updates
level: medium
# ---
# TESTING METHODOLOGY
# To trigger this rule in a lab environment:
#   1. On a Linux test system with auditd or Sysmon for Linux installed
#   2. Run: crontab -e  (then add a harmless line like: * * * * * echo "test")
#   3. Or run: echo "* * * * * echo test" | crontab -
#   4. Verify the process creation event is logged
#   5. Confirm your SIEM fires the alert
#   6. Clean up: crontab -r
# Expected result: Alert fires on crontab invocation or direct cron file edits
