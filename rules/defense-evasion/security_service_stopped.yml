title: Security or Monitoring Service Stopped
id: 7a3f2e01-d4c8-4b91-a1f3-5e8c9d2b4a09
status: experimental
description: |
    Detects attempts to stop critical security and monitoring services including Sysmon,
    Windows Defender, Windows Event Log, and common EDR/AV agents. Disabling security
    tooling is a prerequisite step for many attack chains — adversaries need to blind
    defenders before executing payloads, dumping credentials, or moving laterally.
    This rule catches both sc.exe stop commands and net stop commands targeting security
    services. Any match should be investigated immediately.
references:
    - https://attack.mitre.org/techniques/T1562/001/
author: jawsec
date: 2026/04/01
modified: 2026/04/01
tags:
    - attack.defense_evasion
    - attack.t1562.001
logsource:
    category: process_creation
    product: windows
detection:
    selection_sc_stop:
        Image|endswith: '\sc.exe'
        CommandLine|contains: 'stop'
    selection_net_stop:
        Image|endswith:
            - '\net.exe'
            - '\net1.exe'
        CommandLine|contains: 'stop'
    selection_powershell_stop:
        Image|endswith:
            - '\powershell.exe'
            - '\pwsh.exe'
        CommandLine|contains: 'Stop-Service'
    filter_target_services:
        CommandLine|contains:
            - 'Sysmon'
            - 'sysmon64'
            - 'WinDefend'
            - 'MsMpSvc'
            - 'EventLog'
            - 'Sense'           # Microsoft Defender for Endpoint
            - 'WdNisSvc'        # Windows Defender Network Inspection
            - 'SecurityHealthService'
            - 'wuauserv'        # Windows Update (sometimes disabled before attacks)
            - 'wscsvc'          # Windows Security Center
            - 'ThreatLocker'
            - 'NinjaRMMAgent'
            - 'CrowdStrike'
            - 'SentinelOne'
            - 'CarbonBlack'
            - 'ossec'           # Wazuh agent
    condition: (selection_sc_stop or selection_net_stop or selection_powershell_stop) and filter_target_services
falsepositives:
    - IT administrators performing planned maintenance on security tools
    - Endpoint protection upgrades that require service restarts
    - Automated patching tools that temporarily stop services during updates
level: critical
# ---
# TESTING METHODOLOGY
# To trigger this rule in a lab environment:
#   1. Open an elevated Command Prompt
#   2. Run: sc stop Sysmon64  (or whatever your Sysmon service name is)
#   3. Alternatively: net stop WinDefend
#   4. Verify Sysmon Event ID 1 captures the process creation before the service stops
#   5. Confirm your SIEM fires the alert
#   6. Restart the service: sc start Sysmon64
# WARNING: Actually stopping Sysmon will create a gap in your logging. Only test on
# isolated lab machines, and restart immediately.
# Expected result: Alert fires at critical severity for any security service stop attempt
