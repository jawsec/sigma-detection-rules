title: Timestomping Detected - File Creation Time Modified
id: 7a3f2e01-d4c8-4b91-a1f3-5e8c9d2b4a10
status: experimental
description: |
    Detects timestomping activity by monitoring Sysmon Event ID 2 (FileCreateTime changed).
    Timestomping is when an adversary modifies a file's creation or modification timestamp
    to blend in with legitimate system files or avoid detection by timeline-based forensic
    analysis. If a file's creation timestamp is changed to a date far in the past (especially
    to match surrounding system files), it is almost certainly malicious. Sysmon is one of
    the few tools that reliably catches this technique.
references:
    - https://attack.mitre.org/techniques/T1070/006/
author: jawsec
date: 2026/04/01
modified: 2026/04/01
tags:
    - attack.defense_evasion
    - attack.t1070.006
logsource:
    product: windows
    service: sysmon
detection:
    selection:
        EventID: 2  # File creation time changed
    filter_trusted_processes:
        Image|endswith:
            - '\msiexec.exe'
            - '\setup.exe'
            - '\TiWorker.exe'    # Windows Module Installer
            - '\svchost.exe'
            - '\OneDrive.exe'
            - '\Chrome.exe'
            - '\firefox.exe'
            - '\msedge.exe'
    filter_system_paths:
        TargetFilename|startswith:
            - 'C:\Windows\Installer\'
            - 'C:\Windows\WinSxS\'
    condition: selection and not filter_trusted_processes and not filter_system_paths
falsepositives:
    - Software installers that set file timestamps to match build dates
    - Archive extraction tools (7-Zip, WinRAR) that preserve original timestamps
    - File synchronization tools (OneDrive, Dropbox) restoring original file dates
    - Backup restoration processes that preserve original metadata
level: high
# ---
# TESTING METHODOLOGY
# To trigger this rule in a lab environment:
#   1. Ensure Sysmon is installed with Event ID 2 enabled in your Sysmon config
#   2. Create a test file: echo "test" > C:\Temp\testfile.txt
#   3. Use PowerShell to modify the creation time:
#      (Get-Item "C:\Temp\testfile.txt").CreationTime = "01/01/2020 12:00:00"
#   4. Verify Sysmon Event ID 2 is generated
#   5. Confirm your SIEM fires the alert
#   6. Clean up: Remove-Item C:\Temp\testfile.txt
# Expected result: Alert fires when the file creation time is modified by a non-trusted process
